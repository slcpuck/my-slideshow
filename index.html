<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Hero Slideshow</title>
<style>
  /* Container styling */
  .hero-slideshow {
    position: relative;
    max-width: 100%;
    height: 60vh; /* Adjust height as needed */
    overflow: hidden;
    background-color: #000;
  }

  /* Individual slides */
  .slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
  }

  .slide.active {
    opacity: 1;
    z-index: 1; /* Ensures the active link is clickable */
  }

  /* Make images cover the container */
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Navigation Arrows */
  .prev, .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    width: auto;
    padding: 16px;
    margin-top: -22px;
    color: white;
    font-weight: bold;
    font-size: 24px;
    transition: 0.3s ease;
    user-select: none;
    background-color: rgba(0,0,0,0.3);
    z-index: 10; /* Keeps arrows above the clickable images */
    text-decoration: none;
  }

  .next { right: 0; }
  .prev:hover, .next:hover { background-color: rgba(0,0,0,0.8); }
</style>
</head>
<body>

<div class="hero-slideshow">
  <div class="slide active">
    <a href="https://your-target-link-here.com/shop">
      <img src="https://drive.google.com/uc?export=view&id=YOUR_IMAGE_1_ID" alt="Hero Image 1">
    </a>
  </div>
  
  <div class="slide">
    <a href="#">
      <img src="https://drive.google.com/uc?export=view&id=YOUR_IMAGE_2_ID" alt="Hero Image 2">
    </a>
  </div>

  <div class="slide">
    <a href="#">
      <img src="https://drive.google.com/uc?export=view&id=YOUR_IMAGE_3_ID" alt="Hero Image 3">
    </a>
  </div>

  <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
  <a class="next" onclick="changeSlide(1)">&#10095;</a>
</div>

<script>
  let slideIndex = 0;
  let slides = document.querySelectorAll('.slide');
  let slideInterval;

  function showSlide(index) {
    slides.forEach(slide => slide.classList.remove('active'));
    if (index >= slides.length) { slideIndex = 0; }
    if (index < 0) { slideIndex = slides.length - 1; }
    slides[slideIndex].classList.add('active');
  }

  function changeSlide(n) {
    clearInterval(slideInterval);
    slideIndex += n;
    showSlide(slideIndex);
    startAutoSlide();
  }

  function startAutoSlide() {
    slideInterval = setInterval(() => {
      slideIndex++;
      showSlide(slideIndex);
    }, 5000); 
  }

  showSlide(slideIndex);
  startAutoSlide();
</script>

</body>
</html>
